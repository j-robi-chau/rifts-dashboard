<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIFTS Stat Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header>
        <h1>RIFTS Stat Dashboard</h1>
        <p>Track PPE, MDC, SDC, HP, ammunition, and other encounter resources.</p>
      </header>

      <section class="card add-resource-card">
        <h2>Add Stat Block</h2>
        <form id="resource-form" class="resource-form">
          <label>
            Stat type
            <select id="resource-type"></select>
          </label>
          <label>
            Block title
            <input type="text" id="resource-label" placeholder="e.g. Energy Shield" />
          </label>
          <label>
            Max value
            <input type="number" id="resource-max" min="0" value="50" />
          </label>
          <button type="submit">+ Add Block</button>
        </form>
      </section>

      <section id="stat-sections" class="stat-sections"></section>

      <section class="card action-log-card">
        <h2>Action Log</h2>
        <textarea
          id="action-log-output"
          rows="9"
          placeholder="Stat adjustments will appear here."
          readonly
        ></textarea>
        <div class="controls">
          <button id="clear-log" class="secondary" type="button">Clear Log</button>
        </div>
      </section>

      <section class="card notes-card">
        <h2>Encounter Notes</h2>
        <textarea
          id="session-notes"
          placeholder="Colloquial summaries of your action log will appear here..."
          rows="9"
        ></textarea>
        <button id="clear-notes" class="secondary" type="button">Clear Notes</button>
      </section>
    </main>

    <template id="stat-group-template">
      <section class="card stat-group">
        <div class="group-header">
          <h2 class="group-title"></h2>
          <button class="add-section" type="button">+ Add Section</button>
        </div>
        <div class="card-grid group-grid"></div>
      </section>
    </template>

    <template id="resource-template">
      <article class="card stat-card">
        <div class="stat-heading">
          <input class="section-title" type="text" value="Base" aria-label="Section title" />
          <button class="danger remove-resource" type="button" title="Delete this block">-</button>
        </div>
        <p class="stat-current"></p>
        <div class="controls">
          <button class="change" data-action="-10" type="button">-10</button>
          <button class="change" data-action="-1" type="button">-1</button>
          <button class="change" data-action="+1" type="button">+1</button>
          <button class="change" data-action="+10" type="button">+10</button>
        </div>
        <label>
          Max
          <input class="max-input" type="number" min="0" />
        </label>
        <button class="secondary reset" type="button">Reset</button>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
